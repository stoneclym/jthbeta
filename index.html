<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTH Beta Club</title>
  <meta name="description" content="John T. Hoggard High School Beta Club — Let Us Lead by Serving Others. Chartered 1991." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800;12..96,900&family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg, #FFFBF0); }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="site-shell.jsx"></script>
  <script type="text/babel" src="site-pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = {
      "bg": "#FFFFFF",
      "yellow": "#FFD140",
      "headFont": "Bricolage Grotesque",
      "heroLayout": "stacked"
    };

    const BG_OPTIONS = ['#FFFBF0', '#FAF7F0', '#F5F1E8', '#F4F4EF', '#EEF2F7', '#FFFFFF'];
    const YELLOW_OPTIONS = ['#FFD140', '#FFC107', '#FFDF6B', '#F4B400', '#FFE082'];
    const HEAD_FONTS = ['Bricolage Grotesque', 'Archivo Black', 'Space Grotesk'];

    const PAGES = {
      home: HomePage,
      about: AboutPage,
      signup: SignupPage,
      volunteers: VolunteersPage,
      info: InfoPage,
      contact: ContactPage,
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPageState] = useState(() => {
        const h = (window.location.hash || '').replace('#', '');
        return PAGES[h] ? h : 'home';
      });
      const setPage = (p) => {
        setPageState(p);
        window.location.hash = p;
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      useEffect(() => {
        document.body.style.setProperty('--bg', t.bg);
      }, [t.bg]);

      const fonts = {
        head: `'${t.headFont}', system-ui, sans-serif`,
        body: `'Inter', system-ui, sans-serif`,
      };

      const Page = PAGES[page] || HomePage;

      return (
        <>
          <Shell page={page} setPage={setPage} fonts={fonts} yellow={t.yellow}>
            <Page fonts={fonts} setPage={setPage} yellow={t.yellow} />
          </Shell>

          <TweaksPanel>
            <TweakSection label="Color" />
            <TweakColor
              label="Background"
              value={t.bg}
              options={BG_OPTIONS}
              onChange={(v) => setTweak('bg', v)}
            />
            <TweakColor
              label="Yellow accent"
              value={t.yellow}
              options={YELLOW_OPTIONS}
              onChange={(v) => setTweak('yellow', v)}
            />

            <TweakSection label="Type" />
            <TweakSelect
              label="Headline font"
              value={t.headFont}
              options={HEAD_FONTS}
              onChange={(v) => setTweak('headFont', v)}
            />

            <TweakSection label="Hero" />
            <TweakRadio
              label="Layout"
              value={t.heroLayout}
              options={['stacked', 'centered', 'split']}
              onChange={(v) => setTweak('heroLayout', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
